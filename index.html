<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fridge Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-container">
        <div id="info-box-left" class="grey-box">
            <div id="date">Loading date...</div>
            <div id="moon-phase"></div>
        </div>

        <div id="weather-box">
            <img id="weather-icon" src="" alt="">
            <div class="temp-container">
                <span id="temp-text">--°C</span>
                <div id="hi-lo-text">H: --° L: --°</div>
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <div class="left-col">
            <div class="todo-section">
                <div class="todo-title">Cooking</div>
                <div id="todo-list-dinner">Loading menu...</div>
            </div>
        </div>

        <div class="right-col">
            <div class="todo-section">
                <div class="todo-title">To Do</div>
                <div id="todo-list-tasks">Loading tasks...</div>
            </div>
        </div>

    </div> 

    <div id="quote-box"></div>

    <script>
        // Your JavaScript code stays exactly the same as before 
        // (Just make sure you don't have a line trying to find 'reminders-list' 
        // if you deleted that part of the script earlier!)
    </script>

</body>
</html>
