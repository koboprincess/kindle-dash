<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fridge Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="date" id="date"></div> 
        
        <div id="weather-box">
            <img id="weather-icon" src="" alt="">
            <span id="temp-text">--°C</span>
        </div>

        <div class="solar-stats" id="solar-text"></div> 
    </div>

    <div class="left-col">
        <div class="todo-section">
            <div class="todo-title">Dinner Menu</div>
            <div id="todo-list-dinner">Loading menu...</div>
        </div>
    </div>

    <div class="right-col">
        <div class="todo-section">
            <div class="todo-title">Daily Tasks</div>
            <div id="todo-list-tasks">Loading tasks...</div>
        </div>
    </div>

    <div id="quote-box"></div>

    <script>
        // 1. DATE
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

        // 2. WEATHER
        const WEATHER_KEY = "7b1b3a901f5152f5665f24f1385fb45f";
        const CITY = "Ballyforan"; 

        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`)
            .then(res => res.json())
            .then(data => {
                const temp = Math.round(data.main.temp);
                const iconCode = data.weather[0].icon;
                document.getElementById('temp-text').innerText = `${temp}°C`;
                document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
            })
            .catch(() => {
                document.getElementById('temp-text').innerText = "N/A";
            });

        // 3. TODOIST (Dual List)
        const TODOIST_TOKEN = "002dafd1a220f298022f4d5851a31240a45b7c0a";

        function fetchTasks(projectId, elementId) {
            fetch(`https://api.todoist.com/rest/v2/tasks?project_id=${projectId}`, {
                headers: { 'Authorization': `Bearer ${TODOIST_TOKEN}` }
            })
            .then(res => res.json())
            .then(tasks => {
                const container = document.getElementById(elementId);
                container.innerHTML = tasks.length > 0 
                    ? tasks.slice(0, 6).map(t => `<div class="task-item">○ ${t.content}</div>`).join('')
                    : '<div class="task-item">○ All done!</div>';
            })
            .catch(() => document.getElementById(elementId).innerHTML = "Check Connection");
        }

        fetchTasks("YOUR_DINNER_PROJECT_ID", "todo-list-dinner");
        fetchTasks("YOUR_TASK_PROJECT_ID", "todo-list-tasks");

        // 4. QUOTE
        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.quotable.io/random'))
            .then(res => res.json())
            .then(json => {
                const data = JSON.parse(json.contents);
                document.getElementById('quote-box').innerHTML = `"${data.content}" <span class="quote-author">— ${data.author}</span>`;
            })
            .catch(() => {
                document.getElementById('quote-box').innerHTML = `"The best way to predict the future is to create it." <span class="quote-author">— Peter Drucker</span>`;
            });
    </script>
</body>
</html>
