<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Fridge Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="date" id="date">Tuesday, 14 April</div>
        <div class="solar-stats" id="solar-text">Solar: -- kW</div>
    </div>
<div class="header">
    <div class="date" id="date">Tuesday, 14 April</div>
    <div id="weather-box" style="font-size: 50px;">--°C</div> <div class="solar-stats" id="solar-text">Solar: -- kW</div>
</div>

<script>
    // ... your existing Date and Quote code ...

    // 4. FETCH WEATHER
    const WEATHER_KEY = "7b1b3a901f5152f5665f24f1385fb45f";
    const CITY = "Ballyforan"; // e.g., "Dublin"

    async function fetchWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`);
            const data = await res.json();
            const temp = Math.round(data.main.temp);
            const desc = data.weather[0].main;
            document.getElementById('weather-box').innerText = `${temp}°C | ${desc}`;
        } catch (e) {
            document.getElementById('weather-box').innerText = "Weather N/A";
        }
    }
    fetchWeather();
</script>
    
    <div class="left-col">
        <iframe 
            id="solar-frame" 
            src="REPLACE_WITH_YOUR_HUAWEI_KIOSK_URL" 
            style="width:100%; height:550px; border:none; filter: grayscale(100%);">
        </iframe>
        
        <div id="quote-box">"Fetching your daily inspiration..."</div>
    </div>

    <div class="right-col">
        <div class="todo-title">Tasks & Dinner</div>
        <div id="todo-list">
            <div class="task-item">Loading Todoist...</div>
        </div>
    </div>

    <script>
        // 1. UPDATE THE DATE
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB', dateOptions);

        // 2. FETCH QUOTE (Using api.quotable.io via a proxy to avoid CORS issues)
        async function fetchQuote() {
            try {
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.quotable.io/random'));
                const json = await response.json();
                const data = JSON.parse(json.contents);
                document.getElementById('quote-box').innerText = `"${data.content}" — ${data.author}`;
            } catch (error) {
                document.getElementById('quote-box').innerText = "The best way to predict the future is to create it. — Peter Drucker";
            }
        }
        fetchQuote();

        // 3. FETCH TODOIST TASKS
        // Replace 'YOUR_TOKEN' with your actual Todoist API token
        const TODOIST_TOKEN = "002dafd1a220f298022f4d5851a31240a45b7c0a";

        async function fetchTasks() {
            try {
                const response = await fetch('https://api.todoist.com/rest/v2/tasks', {
                    headers: { 'Authorization': `Bearer ${TODOIST_TOKEN}` }
                });
                const tasks = await response.json();
                const listContainer = document.getElementById('todo-list');
                
                // Show only the first 7 tasks to keep it tidy
                listContainer.innerHTML = tasks.slice(0, 7).map(task => 
                    `<div class="task-item">○ ${task.content}</div>`
                ).join('');
            } catch (error) {
                document.getElementById('todo-list').innerHTML = "Unable to load tasks.";
            }
        }
        fetchTasks();
    </script>
</body>
</html>
