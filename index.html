// 2. MOON PHASE
function getMoonPhase() {
    const now = new Date();
    const lp = 2551443; // Lunar period in seconds
    const new_moon = new Date(1970, 0, 7, 20, 35, 0);
    const phase = ((now.getTime() - new_moon.getTime()) / 1000) % lp;
    const age = Math.floor(phase / (24 * 3600)) + 1;
    const percent = Math.abs((phase / lp) * 2 - 1);
    const illumination = Math.round((1 - percent) * 100);

    let moonData = { name: "", icon: "", percent: illumination };

    if (age <= 1) moonData = { ...moonData, name: "New Moon", file: "newmoon.png" };
    else if (age <= 6) moonData = { ...moonData, name: "Waxing Crescent", file: "waxingcrescent.png" };
    else if (age <= 9) moonData = { ...moonData, name: "First Quarter", file: "firstquarter.png" };
    else if (age <= 14) moonData = { ...moonData, name: "Waxing Gibbous", file: "waxinggibbous.png" };
    else if (age <= 16) moonData = { ...moonData, name: "Full Moon", file: "fullmoon.png" };
    else if (age <= 21) moonData = { ...moonData, name: "Waning Gibbous", file: "waninggibbous.png" };
    else if (age <= 24) moonData = { ...moonData, name: "Last Quarter", file: "lastquarter.png" };
    else if (age <= 28) moonData = { ...moonData, name: "Waning Crescent", file: "waningcrescent.png" };
    else moonData = { ...moonData, name: "New Moon", file: "moon-new.png" };

    return moonData;
}

const moon = getMoonPhase();
document.getElementById('moon-phase').innerHTML = `
    <img src="icons/${moon.file}" style="width:150px; height:150px; filter: grayscale(100%) contrast(2);"> 
    <div class="moon-details">
        <div class="moon-name">${moon.name}</div>
        <div class="moon-percent">${moon.percent}%</div>
    </div>
`;

// 3. WEATHER
const WEATHER_KEY = "7b1b3a901f5152f5665f24f1385fb45f";
const CITY = "Ballyforan"; 

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`)
    .then(res => res.json())
    .then(data => {
        const temp = Math.round(data.main.temp);
        const feelsLike = Math.round(data.main.feels_like);
        const windKmH = Math.round(data.wind.speed * 3.6);
        const iconCode = data.weather[0].icon;

        const iconMap = {
            "04d": "03d", "03n": "02n", "04n": "02n", "09n": "09d",
            "10d": "09d", "10n": "09d", "11n": "11d", "13n": "13d", "50n": "50d"
        };

        const finalIcon = iconMap[iconCode] || iconCode;

        document.getElementById('temp-text').innerText = `${temp}°C`;
        document.getElementById('hi-lo-text').innerHTML = `<b>Feels:</b> ${feelsLike}°<br><b>Wind:</b> ${windKmH} km/h`;
        document.getElementById('weather-icon').src = `icons/${finalIcon}.png`;
    })
    .catch(() => {
        document.getElementById('temp-text').innerText = "N/A";
    });

// 4. GOOGLE SHEETS LISTS
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-LRwu3aSW2J2pq4AnpUAjySLn6EkEVmGK_tOw16uyotwu49164_bT2-xANsMr8w9aLHAdfM8erHUJ/pub?gid=0&single=true&output=csv';

async function updateDashboardTasks() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        const rows = data.split('\n').slice(1);

        let cookingHtml = "";
        let todayHtml = "";
        let remindersHtml = ""; // 1. Create the variable

        rows.forEach(row => {
            const cols = row.split(',');
            if (cols[0] && cols[0].trim()) {
                cookingHtml += `<div class="task-item">○ ${cols[0].trim()}</div>`;
            }
            if (cols[1] && cols[1].trim()) {
                todayHtml += `<div class="task-item">○ ${cols[1].trim()}</div>`;
            }
            // 2. Pull Column C from your sheet for Reminders
            if (cols[2] && cols[2].trim()) {
                remindersHtml += `<div class="task-item">● ${cols[2].trim()}</div>`;
            }
        });

        document.getElementById('todo-list-dinner').innerHTML = cookingHtml || "○ Nothing planned";
        document.getElementById('todo-list-tasks').innerHTML = todayHtml || "○ No tasks";
        
        // 3. Update the new Reminders list
        const reminderBox = document.getElementById('reminders-list');
        if (reminderBox) {
            reminderBox.innerHTML = remindersHtml || "● None today";
        }
    } catch (e) {
        console.error("Sheet Error", e);
    }
}
updateDashboardTasks();
