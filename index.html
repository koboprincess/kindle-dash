        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

        // 2. WEATHER (Updated for Hi/Lo)
        const WEATHER_KEY = "7b1b3a901f5152f5665f24f1385fb45f";
        const CITY = "Ballyforan"; 

        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`)
            .then(res => res.json())
            .then(data => {
                const temp = Math.round(data.main.temp);
                const hi = Math.round(data.main.temp_max);
                const lo = Math.round(data.main.temp_min);
                const iconCode = data.weather[0].icon;

                document.getElementById('temp-text').innerText = `${temp}°C`;
                document.getElementById('hi-lo-text').innerText = `H: ${hi}° L: ${lo}°`;
                document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
            })
            .catch(() => {
                document.getElementById('temp-text').innerText = "N/A";
                document.getElementById('hi-lo-text').innerText = "";
            });

// 3. TODOIST (Updated with better error handling and CORS support)
const TODOIST_TOKEN = "002dafd1a220f298022f4d5851a31240a45b7c0a";

// Inside your index.html script
async function updateDashboardTasks() {
    try {
        // 1. Get all sections first to find the ID by name
        const sectionsRes = await fetch('https://api.todoist.com/rest/v2/sections', {
            headers: { 'Authorization': `Bearer ${TODOIST_TOKEN}` }
        });
        const sections = await sectionsRes.json();
        
        // Find the section named "Cooking"
        const cookingSection = sections.find(s => s.name === "Cooking");
        const REAL_ID = cookingSection ? cookingSection.id : null;
        
        console.log("PAGE LOG: Found Cooking ID:", REAL_ID);

        // 2. Now get the tasks
        const res = await fetch('https://api.todoist.com/rest/v2/tasks', {
            headers: { 'Authorization': `Bearer ${TODOIST_TOKEN}` }
        });
        const allTasks = await res.json();
        
        // ... (rest of your filtering logic) ...
        
        // Use REAL_ID here instead of the hardcoded one
        const cookingTasks = allTasks.filter(t => t.section_id === REAL_ID);
        
        // ... (rest of the display logic)
        document.getElementById('todo-list-tasks').innerHTML = cookingTasks.length > 0 
            ? cookingTasks.slice(0, 8).map(t => `<div class="task-item">○ ${t.content}</div>`).join('')
            : '<div class="task-item">○ Nothing in the Cooking section!</div>';

    } catch (e) {
        console.error("Todoist Error:", e);
        document.getElementById('todo-list-dinner').innerHTML = "Connection Error";
        document.getElementById('todo-list-tasks').innerHTML = "Connection Error";
    }
}
