<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fridge Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="date" id="date">Loading Date...</div>
        <div id="weather-box">--°C</div>
        <div class="solar-stats" id="solar-text">Solar: -- kW</div>
    </div>

    <div class="left-col">
        <iframe id="solar-frame" src="REPLACE_WITH_YOUR_HUAWEI_KIOSK_URL" style="width:100%; height:550px; border:none; filter: grayscale(100%);"></iframe>
        <div id="quote-box">"Fetching inspiration..."</div>
    </div>

    <div class="right-col">
        <div class="todo-title">Tasks & Dinner</div>
        <div id="todo-list">Attempting to connect to Todoist...</div>
    </div>

    <script>
        // 1. DATE
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

        // 2. WEATHER
        const WEATHER_KEY = "REPLACE_WITH_OPENWEATHER_KEY";
        const CITY = "YourCity"; 
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('weather-box').innerText = `${Math.round(data.main.temp)}°C | ${data.weather[0].main}`;
            }).catch(() => document.getElementById('weather-box').innerText = "Weather N/A");

        // 3. QUOTE
        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.quotable.io/random'))
            .then(res => res.json())
            .then(json => {
                const data = JSON.parse(json.contents);
                document.getElementById('quote-box').innerText = `"${data.content}" — ${data.author}`;
            });

        // 4. TODOIST (The Fix)
        const TODOIST_TOKEN = "REPLACE_WITH_YOUR_TODOIST_TOKEN";
        fetch('https://api.todoist.com/rest/v2/tasks', {
            headers: { 'Authorization': `Bearer ${TODOIST_TOKEN}` }
        })
        .then(res => {
            if (!res.ok) throw new Error("Check API Token");
            return res.json();
        })
        .then(tasks => {
            const listContainer = document.getElementById('todo-list');
            if (tasks.length === 0) {
                listContainer.innerHTML = "No active tasks!";
            } else {
                listContainer.innerHTML = tasks.slice(0, 7).map(t => `<div class="task-item">○ ${t.content}</div>`).join('');
            }
        })
        .catch(err => {
            document.getElementById('todo-list').innerHTML = "Todoist Error: " + err.message;
        });
    </script>
</body>
</html>
