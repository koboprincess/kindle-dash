<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fridge Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="date" id="date"></div> 
        
        <div id="weather-box">
            <img id="weather-icon" src="" alt="">
            <span id="temp-text">--°C</span>
        </div>

        <div class="solar-stats" id="solar-text"></div> 
    </div>

    <div class="left-col">
        <div class="todo-section">
            <div class="todo-title">Today's Tasks</div>
            <div id="todo-list-dinner">Loading menu...</div>
        </div>
    </div>

    <div class="right-col">
        <div class="todo-section">
            <div class="todo-title">Cooking</div>
            <div id="todo-list-tasks">Loading tasks...</div>
        </div>
    </div>

    <div id="quote-box"></div>

    <script>
        // 1. DATE
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

        // 2. WEATHER
        const WEATHER_KEY = "7b1b3a901f5152f5665f24f1385fb45f";
        const CITY = "Ballyforan"; 

        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`)
            .then(res => res.json())
            .then(data => {
                const temp = Math.round(data.main.temp);
                const iconCode = data.weather[0].icon;
                document.getElementById('temp-text').innerText = `${temp}°C`;
                document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
            })
            .catch(() => {
                document.getElementById('temp-text').innerText = "N/A";
            });

// 3. TODOIST (Left: Today | Right: Cooking Section)
const TODOIST_TOKEN = "002dafd1a220f298022f4d5851a31240a45b7c0a";
const COOKING_SECTION_ID = "6gPJMqP3cm3JvJw3"; // This is your specific ID

async function updateDashboardTasks() {
    try {
        const res = await fetch('https://api.todoist.com/rest/v2/tasks', {
            headers: { 'Authorization': `Bearer ${TODOIST_TOKEN}` }
        });
        const allTasks = await res.json();
        
        // Get today's date in YYYY-MM-DD format
        const todayStr = new Date().toISOString().split('T')[0];

        // --- 1. FILTER FOR TODAY (LEFT COLUMN: todo-list-dinner) ---
        const todayTasks = allTasks.filter(t => {
            return t.due && t.due.date <= todayStr; 
        });

        document.getElementById('todo-list-dinner').innerHTML = todayTasks.length > 0 
            ? todayTasks.slice(0, 8).map(t => `<div class="task-item">○ ${t.content}</div>`).join('')
            : '<div class="task-item">○ No tasks for today!</div>';

        // --- 2. FILTER FOR COOKING SECTION (RIGHT COLUMN: todo-list-tasks) ---
        const cookingTasks = allTasks.filter(t => t.section_id === COOKING_SECTION_ID);

        document.getElementById('todo-list-tasks').innerHTML = cookingTasks.length > 0 
            ? cookingTasks.slice(0, 8).map(t => `<div class="task-item">○ ${t.content}</div>`).join('')
            : '<div class="task-item">○ Nothing in the Cooking section!</div>';

    } catch (e) {
        console.error("Todoist Error:", e);
        document.getElementById('todo-list-dinner').innerHTML = "Connection Error";
        document.getElementById('todo-list-tasks').innerHTML = "Connection Error";
    }
}

updateDashboardTasks();

        // 4. QUOTE
        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.quotable.io/random'))
            .then(res => res.json())
            .then(json => {
                const data = JSON.parse(json.contents);
                document.getElementById('quote-box').innerHTML = `"${data.content}" <span class="quote-author">— ${data.author}</span>`;
            })
            .catch(() => {
                document.getElementById('quote-box').innerHTML = `"The best way to predict the future is to create it." <span class="quote-author">— Peter Drucker</span>`;
            });
    </script>
</body>
</html>
