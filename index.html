<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fridge Dash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-container">
        <div id="date-box">
            <div class="date" id="date"></div>  
        </div>

        <div id="weather-box">
            <img id="weather-icon" src="" alt="">
            <div class="temp-container">
                <span id="temp-text">--°C</span>
                <div id="hi-lo-text">H: --° L: --°</div>
            </div>
        </div>
    </div>

    <div class="left-col">
        <div class="todo-section">
            <div class="todo-title">To Do</div>
            <div id="todo-list-dinner">Loading menu...</div>
        </div>
    </div>

    <div class="right-col">
        <div class="todo-section">
            <div class="todo-title">Cooking</div>
            <div id="todo-list-tasks">Loading tasks...</div>
        </div>
    </div>

    <div id="quote-box"></div>

    <script>
        // 1. DATE
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

        // 2. WEATHER (Hi/Lo Logic)
        const WEATHER_KEY = "7b1b3a901f5152f5665f24f1385fb45f";
        const CITY = "Ballyforan"; 

        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${WEATHER_KEY}&units=metric`)
            .then(res => res.json())
            .then(data => {
                const temp = Math.round(data.main.temp);
                const hi = Math.round(data.main.temp_max);
                const lo = Math.round(data.main.temp_min);
                const iconCode = data.weather[0].icon;

                document.getElementById('temp-text').innerText = `${temp}°C`;
                document.getElementById('hi-lo-text').innerText = `H: ${hi}° L: ${lo}°`;
                document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
            })
            .catch(() => {
                document.getElementById('temp-text').innerText = "N/A";
                document.getElementById('hi-lo-text').innerText = "";
            });

// 3. GOOGLE SHEETS LISTS
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-LRwu3aSW2J2pq4AnpUAjySLn6EkEVmGK_tOw16uyotwu49164_bT2-xANsMr8w9aLHAdfM8erHUJ/pub?gid=0&single=true&output=csv';

async function updateDashboardTasks() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        const rows = data.split('\n').slice(1); // Skip the header row

        let todayHtml = "";
        let cookingHtml = "";

        rows.forEach(row => {
            const cols = row.split(',');
            if (cols[0] && cols[0].trim()) {
                todayHtml += `<div class="task-item">○ ${cols[0].trim()}</div>`;
            }
            if (cols[1] && cols[1].trim()) {
                cookingHtml += `<div class="task-item">○ ${cols[1].trim()}</div>`;
            }
        });

        document.getElementById('todo-list-dinner').innerHTML = todayHtml || "○ No tasks";
        document.getElementById('todo-list-tasks').innerHTML = cookingHtml || "○ No tasks";
    } catch (e) {
        document.getElementById('todo-list-dinner').innerHTML = "Sheet Error";
    }
}
updateDashboardTasks();
