name: Generate Kindle Image
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const path = require('path');
          (async () => {
            try {
              const browser = await puppeteer.launch({ 
                executablePath: '/usr/bin/google-chrome', 
                args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-web-security'] 
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1680, height: 1264 });
              
              // Use path.join to create a bulletproof file URL
              const filePath = 'file://' + path.join(process.cwd(), 'index-9.html');
              console.log('Loading file: ' + filePath);
              
              await page.goto(filePath, { waitUntil: 'networkidle0' });

              // 10 second wait for your Todoist/Quote APIs
              await new Promise(r => setTimeout(r, 10000));

              await page.screenshot({ path: 'dashboard.png' });
              await browser.close();
              console.log('Screenshot saved successfully!');
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          })();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.png
          git commit -m "Refresh image" || exit 0
          git push
