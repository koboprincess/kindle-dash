name: Generate Kindle Image
on:
  schedule:
    - cron: '0 5-23/1 * * *' # Runs every 3 hours, between 6:00 and 23:59 UTC
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const path = require('path');
          (async () => {
            try {
              console.log('Starting Puppeteer...');
              // In your generate_image.yml, update the launch args:
          const browser = await puppeteer.launch({ 
            headless: 'new',
            args: [
              '--no-sandbox', 
              '--disable-setuid-sandbox', 
              '--disable-web-security', // This should help
              '--allow-file-access-from-files' // Add this
            ] 
          });
              const page = await browser.newPage();
              page.on('console', msg => console.log('PAGE LOG:', msg.text()));
              await page.setViewport({ width: 1680, height: 1264 });
              
              const filePath = 'file://' + path.resolve('index.html');
              console.log('Attempting to load: ' + filePath);
              
              await page.goto(filePath, { waitUntil: 'networkidle0' });

              console.log('Page loaded. Waiting 10s for APIs...');
              await new Promise(r => setTimeout(r, 10000));

              await page.screenshot({ path: 'dashboard.png' });
              console.log('Dashboard.png created successfully!');
              
              await browser.close();
            } catch (err) {
              console.error('ERROR DETECTED:');
              console.error(err.message);
              process.exit(1);
            }
          })();
          "

      - name: Convert for Kindle
        run: |
          sudo apt-get install -y imagemagick
          convert dashboard.png -rotate 90 -resize 1264x1680! -colorspace gray -depth 8 -type Grayscale -strip PNG8:dashboard.png

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.png
          git commit -m "Refresh dashboard image" || exit 0
          git push
