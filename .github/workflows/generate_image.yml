name: Generate Kindle Dash Image
on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install puppeteer

      - name: Take Dashboard Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            
            // Set viewport to your Kindle Oasis resolution
            await page.setViewport({ width: 1680, height: 1264 });
            
            // Load the local index.html file
            await page.goto('file://${{ github.workspace }}/index.html', { 
              waitUntil: 'networkidle0' // Wait for all API calls to finish
            });

            // Give it 2 extra seconds just to be sure data is rendered
            await new Promise(r => setTimeout(r, 2000));

            await page.screenshot({ path: 'dashboard.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push Image
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.png
          git commit -m "Update dashboard image" || exit 0
          git push
