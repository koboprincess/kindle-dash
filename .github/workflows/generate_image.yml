name: Generate Kindle Image
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Take Screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              executablePath: '/usr/bin/google-chrome', 
              args: ['--no-sandbox', '--disable-web-security'] // Added disable-web-security
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1680, height: 1264 });
            
            // Go to the page
            await page.goto('file://${{ github.workspace }}/index-9.html');

            // WAITING: Instead of just 2 seconds, wait 10 seconds to ensure the API calls finish
            await new Promise(r => setTimeout(r, 10000));

            await page.screenshot({ path: 'dashboard.png' });
            await browser.close();
          })();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.png
          git commit -m "Refresh image" || exit 0
          git push
